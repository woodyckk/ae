name: 15-Min Auto Update

on:
  schedule:
    - cron: '*/15 * * * *' # 每 15 分鐘自動執行
  workflow_dispatch:      # 允許你手動按按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 賦予寫入權限，讓它能更新檔案
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run Scraper
        run: python update_data.py
      - name: Commit and push changes
        run: |
          git config --global user.name "Auto Updater"
          git config --global user.email "actions@github.com"
          git add ha_data.json
          git commit -m "Update HA data [skip ci]" || exit 0
          git push
