<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港急症室實時輪候</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #003087; color: white; padding: 20px; text-align: center; }
        .hosp-row { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #eee; }
        .time-tag { color: #d9480f; font-weight: bold; background: #fff0f0; padding: 4px 10px; border-radius: 5px; }
        #update-at { font-size: 12px; opacity: 0.8; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>🏥 急症室實時輪候</h2>
        <div id="update-at">載入中...</div>
    </div>
    <div id="list">
        <div style="padding:40px; text-align:center;">📡 正在連線醫管局數據中心...</div>
    </div>
</div>

<script>
    // ⚠️ 呢度請換成你喺第二步整好嘅 Worker 網址！
    const API_URL = "https://hk-ae-api.woodyckk.workers.dev/";

    async function fetchWaitTimes() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            document.getElementById('update-at').innerText = "最後更新: " + data.updateTime;
            
            const listHtml = data.hospitals.map(h => `
                <div class="hosp-row">
                    <span>${h.name}</span>
                    <span class="time-tag">${h.time}</span>
                </div>
            `).join('');
            
            document.getElementById('list').innerHTML = listHtml;
        } catch (e) {
            document.getElementById('list').innerHTML = '<div style="padding:20px; color:red;">讀取失敗，請稍後再試</div>';
        }
    }

    fetchWaitTimes();
    // 每 15 分鐘自動刷新一次 (醫管局數據更新頻率)
    setInterval(fetchWaitTimes, 15 * 60 * 1000);
</script>
</body>
</html>
