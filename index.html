<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公立醫院輪候實時 Dashboard</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #003087; font-size: 22px; margin-bottom: 15px; }
        .status-bar { text-align: center; font-size: 13px; padding: 12px; margin-bottom: 20px; border-radius: 8px; font-weight: bold; }
        .loading { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { font-size: 12px; color: #7f8c8d; text-transform: uppercase; background: #fafafa; }
        .hosp-name { font-weight: bold; color: #34495e; display: block; }
        .wait-time { font-size: 18px; font-weight: 800; color: #d9480f; }
        .update-time { font-size: 11px; color: #95a5a6; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏛️ 公立醫院急症室輪候實時</h1>
    <div id="status" class="status-bar loading">🔄 正在透過官方 API 獲取實時數據...</div>

    <table>
        <thead>
            <tr>
                <th>醫院名稱 (及數據時間)</th>
                <th>預計等候時間</th>
            </tr>
        </thead>
        <tbody id="hosp-list">
            </tbody>
    </table>
</div>

<script>
    async function loadPublicData() {
        const statusEl = document.getElementById('status');
        const listEl = document.getElementById('hosp-list');
        // 醫管局官方 JSON 路徑
        const HA_URL = "https://www.ha.org.hk/opendata/aewaitingtime/aewaitingtime-tc.json";
        
        // 三層備援中轉站，解決單一 Proxy 繁忙問題
        const proxies = [
            `https://api.allorigins.win/get?url=${encodeURIComponent(HA_URL)}`,
            `https://corsproxy.io/?${encodeURIComponent(HA_URL)}`,
            `https://thingproxy.freeboard.io/fetch/${HA_URL}`
        ];

        for (let url of proxies) {
            try {
                const response = await fetch(url);
                if (!response.ok) continue;

                const rawData = await response.json();
                // 兼容不同中轉站的回傳格式
                const dataStr = rawData.contents ? rawData.contents : (typeof rawData === 'string' ? rawData : JSON.stringify(rawData));
                const data = typeof dataStr === 'string' ? JSON.parse(dataStr) : dataStr;

                if (data && data.waitTime) {
                    renderTable(data);
                    statusEl.innerText = "✅ 數據已成功對接政府 API";
                    statusEl.className = "status-bar success";
                    return; 
                }
            } catch (err) {
                console.warn("目前路徑失效，嘗試備用方案...");
            }
        }
        statusEl.innerText = "❌ 醫管局伺服器連線超時，請按重新整理。";
        statusEl.className = "status-bar error";
    }

    function renderTable(data) {
        const listEl = document.getElementById('hosp-list');
        listEl.innerHTML = "";
        data.waitTime.forEach(h => {
            const row = `<tr>
                <td>
                    <span class="hosp-name">${h.hospName}</span>
                    <span class="update-time">更新: ${data.updateTime}</span>
                </td>
                <td><span class="wait-time">${h.topWait}</span></td>
            </tr>`;
            listEl.innerHTML += row;
        });
    }

    window.onload = loadPublicData;
</script>
</body>
</html>
