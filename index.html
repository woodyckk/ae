<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全港公私營醫療輪候 Dashboard</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --private: #8e44ad; --bg: #f8f9fa; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .dashboard { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; margin-bottom: 5px; }
        .status-bar { text-align: center; font-size: 0.85rem; color: #666; margin-bottom: 20px; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f2f2f2; padding: 12px; text-align: left; font-size: 0.9rem; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .cat-row { background: #fdfdfd; font-weight: bold; }
        .private-cat { color: var(--private); border-left: 5px solid var(--private); }
        .gov-cat { color: var(--primary); border-left: 5px solid var(--primary); }
        
        .hosp-info { display: flex; flex-direction: column; }
        .hosp-name { font-weight: bold; color: #333; }
        .hosp-time { font-size: 0.75rem; color: #999; margin-top: 3px; }
        
        .wait-time { font-weight: bold; font-size: 1.1rem; }
        .warning { color: var(--accent); }
        .rescue { color: #d35400; background: #fff5eb; padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        
        .btn { font-size: 0.75rem; padding: 4px 8px; border-radius: 5px; text-decoration: none; border: 1px solid; cursor: pointer; display: inline-block; }
        .btn-private { color: var(--private); border-color: var(--private); }
        .btn-update { background: #eee; color: #666; border-color: #ccc; margin-left: 5px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>🏥 醫療輪候 Dashboard</h1>
    <div class="status-bar" id="globalStatus">正在連線至醫管局 (HA) 實時數據庫...</div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>醫院名稱 (及更新時間)</th>
                    <th>危急 (第一類)</th>
                    <th>次緊急 (第三類)</th>
                    <th>非緊急 (第四/五類)</th>
                </tr>
            </thead>
            <tbody id="privateBody">
                <tr class="cat-row"><td colspan="4" class="private-cat">🌟 私家醫院 (請點擊官網核實並記錄)</td></tr>
                <tr id="hksh">
                    <td>
                        <div class="hosp-info">
                            <span class="hosp-name">養和醫院 (跑馬地)</span>
                            <span class="hosp-time" id="hksh-upd">需手動核實</span>
                        </div>
                    </td>
                    <td colspan="2"><a href="https://patser.hksh.com/fmcwaitingtime?lang=zh" target="_blank" class="btn btn-private">打開官網</a></td>
                    <td class="wait-time" id="hksh-val" onclick="updatePrivate('hksh')">約 1.5 小時 ✎</td>
                </tr>
                <tr id="union">
                    <td>
                        <div class="hosp-info">
                            <span class="hosp-name">仁安醫院 (大圍)</span>
                            <span class="hosp-time" id="union-upd">需手動核實</span>
                        </div>
                    </td>
                    <td colspan="2"><a href="https://www.union.org/tc/" target="_blank" class="btn btn-private">打開官網</a></td>
                    <td class="wait-time" id="union-val" onclick="updatePrivate('union')">約 2 小時 ✎</td>
                </tr>
            </tbody>

            <tbody id="govBody">
                <tr class="cat-row"><td colspan="4" class="gov-cat">🏛️ 公立醫院 (實時同步醫管局數據)</td></tr>
                <tr><td colspan="4" style="text-align:center;">數據同步中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 醫管局實時數據抓取 (加入防止緩存的隨機參數)
    const HA_URL = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://www.ha.org.hk/opendata/aewaitingtime/aewaitingtime-tc.json?v=" + new Date().getTime());

    async function fetchHAData() {
        const govBody = document.getElementById('govBody');
        const status = document.getElementById('globalStatus');

        try {
            const response = await fetch(HA_URL);
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            status.innerText = `最後同步成功：${new Date().toLocaleTimeString()}`;
            renderGovTable(data.waitTime, data.updateTime);
        } catch (e) {
            status.innerText = "❌ 實時同步失敗，請刷新頁面。";
        }
    }

    function renderGovTable(hospitals, commonTime) {
        const govBody = document.getElementById('govBody');
        // 先保留標題行
        govBody.innerHTML = '<tr class="cat-row"><td colspan="4" class="gov-cat">🏛️ 公立醫院 (實時同步醫管局數據)</td></tr>';

        hospitals.forEach(h => {
            const isRescue = h.t1wt.includes("搶救");
            const isLong = parseFloat(h.t45p95) >= 6;
            
            const row = `
                <tr>
                    <td>
                        <div class="hosp-info">
                            <span class="hosp-name">${h.hospName}</span>
                            <span class="hosp-time">數據更新：${commonTime}</span>
                        </div>
                    </td>
                    <td class="${isRescue ? 'rescue' : ''}">${h.t1wt}</td>
                    <td>${h.t3p50}</td>
                    <td class="wait-time ${isLong ? 'warning' : ''}">${h.t45p95}</td>
                </tr>
            `;
            govBody.innerHTML += row;
        });
    }

    // 私家醫院手動更新功能
    function updatePrivate(id) {
        const newVal = prompt("請輸入該醫院目前的等候時間 (例如: 2.5 小時):");
        if (newVal) {
            document.getElementById(`${id}-val`).innerText = newVal + " ✎";
            document.getElementById(`${id}-upd`).innerText = "最後手動更新: " + new Date().toLocaleTimeString();
        }
    }

    // 初始化
    fetchHAData();
    // 每 5 分鐘自動重新抓取公立醫院數據
    setInterval(fetchHAData, 300000);
</script>

</body>
</html>
